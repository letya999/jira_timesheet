services:
  db:
    image: postgres:15-alpine
    env_file:
      - .env.dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-jira_timesheet}
    ports:
      - "5432:5432"
    volumes:
      - db_data_dev:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    volumes:
      - .:/app
      - /app/.venv
    ports:
      - "8000:8000"
    env_file:
      - .env.dev
    depends_on:
      - db
      - redis
    # Using uv run from the backend directory
    working_dir: /app/backend
    command: >
      sh -c "uv run alembic upgrade head && uv run uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    volumes:
      - .:/app
      - /app/.venv
    env_file:
      - .env.dev
    environment:
      - PYTHONPATH=/app/backend
    depends_on:
      - db
      - redis
    working_dir: /app/backend
    command: uv run python -m core.worker

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    volumes:
      - .:/app
      - /app/.venv
    ports:
      - "8501:8501"
    env_file:
      - .env.dev
    environment:
      - BACKEND_URL=http://backend:8000/api/v1
    depends_on:
      - backend
    working_dir: /app/frontend
    command: uv run streamlit run app.py --server.port 8501 --server.address 0.0.0.0

volumes:
  db_data_dev:
