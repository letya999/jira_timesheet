services:
  db:
    image: postgres:15-alpine
    env_file:
      - .env.dev
    ports:
      - "5432:5432"
    volumes:
      - db_data_dev:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    volumes:
      - .:/app
      - /app/.venv
    ports:
      - "8000:8000"
    env_file:
      - .env.dev
    depends_on:
      - db
      - redis
    # Using uv run from the backend directory
    working_dir: /app/backend
    command: >
      sh -c "uv run alembic upgrade head && uv run uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    volumes:
      - .:/app
      - /app/.venv
    env_file:
      - .env.dev
    environment:
      - PYTHONPATH=/app/backend
    depends_on:
      - db
      - redis
    working_dir: /app/backend
    command: uv run python -m core.worker

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    volumes:
      - ./web:/app
      - /app/node_modules
    ports:
      - "8501:5173"
    environment:
      - VITE_PROXY_TARGET=http://backend:8000
      - VITE_API_URL=
    depends_on:
      - backend

volumes:
  db_data_dev:
  vanna_data_dev:
