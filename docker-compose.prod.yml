version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: jira_timesheet_db_prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app_network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G

  redis:
    image: redis:7-alpine
    container_name: jira_timesheet_redis_prod
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - app_network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 512M

  backend:
    build: ./backend
    container_name: jira_timesheet_backend_prod
    env_file:
      - .env.prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app_network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  frontend:
    build: ./frontend
    container_name: jira_timesheet_frontend_prod
    env_file:
      - .env.prod
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - app_network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  caddy:
    image: caddy:2-alpine
    container_name: jira_timesheet_caddy_prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    networks:
      - app_network
    restart: always

networks:
  app_network:
    driver: bridge

volumes:
  db_data_prod:
  caddy_data:
  caddy_config:
