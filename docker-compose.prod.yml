services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: timesheet
    volumes:
      - db_data_prod:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    restart: always

  backend:
    build: ./backend
    env_file:
      - .env.prod
    depends_on:
      - db
      - redis
    restart: always

  frontend:
    build: ./frontend
    env_file:
      - .env.prod
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: always

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    restart: always

volumes:
  db_data_prod:
  caddy_data:
  caddy_config: