version: '3.8'

services:
  # ===========================================================================
  # PostgreSQL
  # ===========================================================================
  db:
    image: postgres:15-alpine
    container_name: jira_timesheet_db_prod
    env_file:
      - .env.production
    volumes:
      - db_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app_network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G

  # ===========================================================================
  # Redis
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: jira_timesheet_redis_prod
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - app_network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 512M

  # ===========================================================================
  # Backend
  # ===========================================================================
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: jira_timesheet_backend_prod
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app_network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  # ===========================================================================
  # Worker
  # ===========================================================================
  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: jira_timesheet_worker_prod
    env_file:
      - .env.production
    environment:
      - PYTHONPATH=/app/backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app_network
    restart: always
    command: uv run python -m core.worker
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ===========================================================================
  # Web (React Frontend)
  # ===========================================================================
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: jira_timesheet_web_prod
    networks:
      - app_network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ===========================================================================
  # Caddy (Ingress / Gatekeeper)
  # ===========================================================================
  caddy:
    image: caddy:2-alpine
    container_name: jira_timesheet_caddy_prod
    ports:
      - "8080:8080"
    environment:
      - DOMAIN_IP=${DOMAIN_IP}
    volumes:
      - ./Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - caddy_data_prod:/data
      - caddy_config_prod:/config
    depends_on:
      - web
      - backend
    networks:
      - app_network
    restart: always

networks:
  app_network:
    driver: bridge

volumes:
  db_data_prod:
  caddy_data_prod:
  caddy_config_prod:
  vanna_data_prod:
